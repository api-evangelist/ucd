    summary: >-
      UCD has no central developer portal, but a real, verifiable
      machine-readable footprint exists in its library and cultural-heritage
      systems. Confirmed live: the GitHub org, duchas.ie, digital.ucd.ie, the
      Research Repository, and the Dúchas API docs at docs.gaois.ie. The Dúchas
      API base returns HTTP 500 on a bare request (key/params required) which
      confirms it is live but gated. The data.ucd.ie host (cited as the IIIF
      image base in third-party docs) did not resolve during probing, and the
      digital.ucd.ie research/index.php docs page is now 404 — so IIIF and
      geospatial endpoints are documented but not all directly reachable from
      published URLs. No endpoints were fabricated; gated/unreachable items are
      flagged below.
