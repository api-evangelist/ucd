---
aid: ucd
name: University College Dublin
description: >-
  University College Dublin (UCD) is Ireland's largest university and ranks
  #126 in the QS World University Rankings 2025. Its public, machine-readable
  footprint is concentrated in library and cultural-heritage systems rather
  than a central developer portal: the UCD Digital Library exposes IIIF Image
  and Presentation APIs plus a Geospatial Data API and unAPI endpoint, the
  DSpace-based Research Repository UCD offers OAI-PMH harvesting and a REST
  API, and the National Folklore Collection held at UCD is served via the
  Dúchas API. There is no unified, self-service institutional API program;
  most administrative and identity systems are gated behind institutional
  affiliation.
type: Index
position: Consumer
